name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/build.yml

  test-ui:
    needs: build
    uses: ./.github/workflows/test-ui.yml

  test-semantics:
    needs: build
    uses: ./.github/workflows/test-semantics.yml

