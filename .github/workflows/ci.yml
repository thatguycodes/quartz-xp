name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/build.yml

  test-ui:
    needs: build
    uses: ./.github/workflows/test-ui.yml

  test-semantics:
    needs: build
    uses: ./.github/workflows/test-semantics.yml

  ui-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-ui, test-semantics]
    uses: ./.github/workflows/ui-release.yml
    secrets: inherit

  semantic-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-ui, test-semantics]
    uses: ./.github/workflows/semantic-release.yml
    secrets: inherit

  ui-release-dry-run:
    if: github.event_name == 'pull_request'
    needs: [test-ui, test-semantics]
    uses: ./.github/workflows/ui-release.yml
    with:
      dry_run: true
    secrets: inherit

  semantic-release-dry-run:
    if: github.event_name == 'pull_request'
    needs: [test-ui, test-semantics]
    uses: ./.github/workflows/semantic-release.yml
    with:
      dry_run: true
    secrets: inherit
