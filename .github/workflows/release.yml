name: Semantic Release

on:
    push:
        branches:
            - main # Make sure this matches your default branch

jobs:
    # Builds packages from the Nx monorepo and releases them.
    release:
        name: Build and Release Packages
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # semantic-release requires all history to determine versions
                  persist-credentials: false

            - name: Setup Node & NPM Registry
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  registry-url: "https://registry.npmjs.org" # Optimal for semantic-release publishing

            - name: Update npm to the latest version
              run: npm install -g npm@latest

            - name: Install Dependencies
              run: npm ci --prefer-offline --ignore-scripts

            - name: Build Packages (Nx)
              # Assuming you use Nx's run-many or affected to build publishable libraries.
              # Update command if your build script differs.
              run: npx nx run-many -t build
              env:
                  FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
                  FIGMA_FILE_ID: ${{ secrets.FIGMA_FILE_ID }}

            # - name: Import GPG key for commit signing
            #   uses: crazy-max/ghaction-import-gpg@v6
            #   with:
            #       gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
            #       passphrase: ${{ secrets.GPG_PASSPHRASE }}
            #       git_user_signingkey: true
            #       git_commit_gpgsign: true

            - name: Run Semantic Release (Publish to NPM)
              run: npx semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.ADMIN_ACCESS_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # standard for @actions/setup-node registry auth
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # fallback for @semantic-release/npm
                  GIT_COMMITTER_NAME: Sage Carbon
                  GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
